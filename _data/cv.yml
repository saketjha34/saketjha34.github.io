    Projects:
      - name: FileForge
        summary: A distributed file storage system enabling secure file and folder management with scalable backend architecture.
        highlights:
          - Built a distributed file storage system supporting nested folders, uploads, ZIP extraction, and favorites.
          - Implemented secure authentication and session management using JWT and OAuth2.
          - Integrated MinIO object storage with PostgreSQL metadata storage and optimized indexing.
          - Achieved ~40% faster file metadata queries with optimized database design.
          - Designed modular FastAPI routes and containerized deployment using Docker.
        start_date: 2025-01-01
        end_date: 2025-03-01

      - name: ATLAS – Adaptive Traffic Light Allocation System
        summary: A computer vision based adaptive traffic signal system that dynamically allocates signal timings using real-time vehicle detection and tracking.
        highlights:
          - Developed real-time vehicle detection and tracking using YOLOv8 and ByteTrack.
          - Implemented Region Masking and frame-based confirmation filtering for accurate vehicle counting.
          - Designed DBWSA algorithm to dynamically allocate green signal time based on vehicle density and class.
          - Achieved 25% average and 50% peak efficiency improvements over fixed traffic signals across 500+ simulations.
          - Built a flexible pipeline supporting multi-source video input, YAML configuration, and Pydantic validation.
        start_date: 2024-08-01
        end_date: 2024-12-01

      - name: FilmFusion
        summary: A hybrid movie recommendation system combining semantic embeddings with content-based filtering.
        highlights:
          - Implemented hybrid recommendation using Sentence Transformers and semantic similarity.
          - Used FAISS vector indexing for efficient embedding search and retrieval.
          - Enabled dynamic filtering by genre, language, popularity, runtime, and release year.
          - Built an interactive web interface using Streamlit.
        start_date: 2024-05-01
        end_date: 2024-07-01

